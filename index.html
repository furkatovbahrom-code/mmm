<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Buttons</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#dfe9f3,#ffffff);
    font-family: Arial, sans-serif;
}

.container{
    width:400px;
    padding:30px;
    border-radius:25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:20px;
}

.btn{
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:16px;
    color:white;
    cursor:pointer;
    transition:0.3s;
    backdrop-filter: blur(10px);
}

.btn1{ background: linear-gradient(135deg,#7f5af0,#6246ea);}
.btn2{ background: linear-gradient(135deg,#2cb67d,#1abc9c);}
.btn3{ background: linear-gradient(135deg,#ff8906,#f25f4c);}
.btn4{ background: linear-gradient(135deg,#00c6ff,#0072ff);}
.btn5{ background: linear-gradient(135deg,#ff4ecd,#a020f0);}
.btn6{ background: linear-gradient(135deg,#43e97b,#38f9d7);}

.btn:hover{
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="container">
    <button class="btn btn1">Primary</button>
    <button class="btn btn2">Secondary</button>
    <button class="btn btn3">Warning</button>
    <button class="btn btn4">Info</button>
    <button class="btn btn5">Premium</button>
    <button class="btn btn6">Success</button>
</div>

</body>
</html>
